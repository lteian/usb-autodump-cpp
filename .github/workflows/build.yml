name: Build Windows EXE (Qt5)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Qt5
        uses: jurplel/setup-qt@v5
        with:
          version: 5.15.2
          arch: win64_msvc2019_64

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 16 2019" -A x64 ..

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir dist
          windeployqt build/Release/usb-autodump.exe --no-translations --no-webkit --no-compiler-runtime
          cp build/Release/usb-autodump.exe dist/

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-EXE
          path: dist/usb-autodump.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/usb-autodump.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
