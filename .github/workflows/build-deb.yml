name: Build Linux DEB (Qt5)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qt5-default qtbase5-dev cmake build-essential ruby ruby-dev rubygems fuse
          sudo gem install fpm --no-document

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Build
        run: cmake --build build --config Release

      - name: Package DEB
        run: |
          mkdir -p dist/deb_root/usr/local/bin/
          mkdir -p dist/deb_root/usr/share/applications/
          cp build/usb-autodump dist/deb_root/usr/local/bin/usb-autodump
          cp linux/usb-autodump.desktop dist/deb_root/usr/share/applications/
          fpm -s dir -t deb -n usb-autodump -v 1.0.0 \
            -p dist/usb-autodump_1.0.0_amd64.deb \
            -f dist/deb_root

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-DEB
          path: dist/usb-autodump_1.0.0_amd64.deb
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/usb-autodump_1.0.0_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
